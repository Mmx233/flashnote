addr: ":8080"
storePath: "./data"
maxTextSize: 65536        # 64KB
maxFileSize: 10485760     # 10MB
defaultTTL: "1h"
minTTL: "5m"
maxTTL: "24h"
ttlOptions:
  - "5m"
  - "30m"
  - "1h"
  - "6h"
  - "24h"
blurDisconnectTimeout: "5m"
wsReadTimeout: "60s"
wsHeartbeatInterval: "30s"
wsSendBufferSize: 256
